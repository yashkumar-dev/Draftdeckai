name: Security & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache-dependency-path: '**/package-lock.json'

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan \
            --exclude-files 'public[\\/]sw\.js' \
            --exclude-files '__tests__[\\/].*' \
            --exclude-files 'package-lock\.json' \
            > /tmp/current_baseline.json

          python3 -c "
          import json
          with open('/tmp/current_baseline.json') as f:
              b = json.load(f)
          results = b.get('results', {})
          if results:
              print('SECRETS DETECTED:')
              for fname, secrets in results.items():
                  for s in secrets:
                      print(f'  {fname}:{s[\"line_number\"]} - {s[\"type\"]}')
              exit(1)
          else:
              print('No secrets detected')
          "
