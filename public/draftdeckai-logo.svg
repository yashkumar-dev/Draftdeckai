<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Deck of cards/documents stack -->
  <g id="deck">
    <!-- Back card (purple) -->
    <rect x="45" y="65" width="90" height="110" rx="8" fill="#8B5CF6" opacity="0.3" transform="rotate(-8 90 120)"/>

    <!-- Middle card (blue) -->
    <rect x="50" y="60" width="90" height="110" rx="8" fill="#3B82F6" opacity="0.5" transform="rotate(-4 95 115)"/>

    <!-- Front card (gradient blue to purple) -->
    <defs>
      <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect x="55" y="55" width="90" height="110" rx="8" fill="url(#cardGradient)" stroke="#1E40AF" stroke-width="2"/>

    <!-- Document lines on front card -->
    <line x1="70" y1="80" x2="130" y2="80" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="70" y1="95" x2="125" y2="95" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="70" y1="110" x2="130" y2="110" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="70" y1="125" x2="120" y2="125" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- AI Sparkle -->
    <g id="sparkle" transform="translate(120, 65)">
      <circle cx="0" cy="0" r="12" fill="#FCD34D" opacity="0.9"/>
      <path d="M 0,-8 L 2,-2 L 8,0 L 2,2 L 0,8 L -2,2 L -8,0 L -2,-2 Z" fill="white"/>
    </g>
  </g>
</svg>
